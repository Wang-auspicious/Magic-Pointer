<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';" />
  <title>Magic Pointer Overlay</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="trail"></canvas>
  <div id="hint" class="hint">Hold and sweep a line, circle an object, or gesture over anything</div>
  <div id="pill" class="pill hidden">
    <div class="equalizer" aria-hidden="true"><span></span><span></span><span></span></div>
    <input id="command" autocomplete="off" spellcheck="false" placeholder="Tell me what to do... / ?????..." />
    <button id="run" title="Run">?</button>
  </div>
  <div id="result" class="result hidden"></div>
  <script src="overlay.js"></script>
</body>
</html>
